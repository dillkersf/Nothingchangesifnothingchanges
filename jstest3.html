<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js Reveal Effect</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <script src="jstest3.js" defer></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #backLink {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      text-decoration: none;
      display: none;
      border: 2px solid white;
      padding: 10px 20px;
      transition: 0.3s;
    }

    #backLink:hover {
      background: white;
      color: red;
    }
  </style>
</head>

<body>

<a id="backLink" href="index.html">Back</a>

</body>
</html>
